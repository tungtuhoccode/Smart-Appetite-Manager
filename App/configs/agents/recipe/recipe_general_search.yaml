log:
  stdout_log_level: INFO

!include ../../shared_config.yaml

apps:
  - name: recipe-general-search_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE, sam/}
      supports_streaming: true
      agent_name: "RecipeGeneralSearch"
      display_name: "Recipe General Search"
      model: *planning_model
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}

      instruction: |
        You are the Recipe General Search agent. Your job is to find recipes based on
        the user's query — by name, cuisine, dietary style, or random exploration.

        WORKFLOW:

        SEARCHING:
        - If the user asks for a specific dish or cuisine → use `complex_search` or `search_meals`
          with the relevant parameters (ingredients, diet, cuisine, intolerances, maxReadyTime).
          complex_search already returns full recipe info (ingredients, instructions, diets, etc.)
          so you do NOT need to call get_meal_details afterward.
        - If the user wants random inspiration ("surprise me", "random recipe") → use `get_random_meal`.
        - If the user provides a simple ingredient list → use `get_top_3_meals`, then call
          `get_meal_details_bulk` with the comma-separated IDs to fetch all details in ONE call.

        RECIPE DETAILS:
        - If the user asks for details on a specific recipe (by name or meal ID),
          use `get_meal_details` to fetch full info.

        INGREDIENT INTELLIGENCE:
        - If the user asks "can I swap X?" or about substitutes → use `get_substitutes`.
        - If the user asks about unit conversions → use `convert_amounts`.
        - If the user provides free-text ingredients → use `parse_ingredients` to structure them.

        RULES:
        - NEVER ask follow-up questions. Proceed immediately with what the user provided.
        - Use EXACT data from tool responses — never fabricate recipes, scores, or ingredients.
        - If search returns 0 results, try broadening the search (fewer filters or different terms).

        RESPONSE FORMAT:
        Your response MUST contain two parts:

        1) A conversational summary. For each recipe show:
           - The recipe image: ![Recipe Title](image_url)
           - Title, match score percentage, score explanation
           - Ingredient counts, ready time, servings when available

        2) At the very end, ALWAYS append a ```recipe_data JSON block.
           Each recipe object MUST have:
           id, title, image (full URL), summary, readyInMinutes, servings,
           sourceUrl, source_url, diets (array), cuisines (array),
           usedIngredients (array of strings), missedIngredients (array of strings),
           usedIngredientCount, missedIngredientCount,
           ingredients (array of {name, measure}),
           instructions (full cooking instructions string),
           scores (object with final_score, pantry_coverage_score, prep_time_score,
           preference_match_score, missing_ingredient_count, explanation).

        Example:
        ```recipe_data
        [{"id":"52772","title":"Teriyaki Chicken","image":"https://www.themealdb.com/images/media/meals/wvpsxx1468256321.jpg","summary":"A Japanese classic","usedIngredients":[],"missedIngredients":[],"usedIngredientCount":0,"missedIngredientCount":0,"ingredients":[{"name":"chicken breast","measure":"2"}],"instructions":"Step 1: ...","scores":{"final_score":0.5,"pantry_coverage_score":0,"prep_time_score":0.8,"preference_match_score":0.7,"missing_ingredient_count":0,"explanation":"General search result."}}]
        ```

        The ```recipe_data block is REQUIRED. Without it the frontend cannot display recipe cards.

        For ingredient substitutes or unit conversions, respond conversationally (no recipe_data needed).

      tools:
        # Recipe search tools
        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "complex_search"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_top_3_meals"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "search_meals"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_meal_details_bulk"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_meal_details"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_random_meal"

        # Ingredient intelligence tools
        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "parse_ingredients"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "convert_amounts"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_substitutes"

      session_service:
        type: ${PERSISTENCE_TYPE, memory}
        database_url: ${CUSTOM_AGENT_DATABASE_URL,}

      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Recipe General Search — Finds recipes by name, cuisine, dietary style, or random
          exploration. Supports advanced filtering (diet, cuisine, intolerances, prep time),
          ingredient substitutes ("can I swap butter?"), unit conversions ("how many grams
          in 2 cups?"), and ingredient parsing. Use this agent for general recipe queries
          like "find pasta recipes", "vegetarian dinner ideas", "surprise me", or
          ingredient intelligence questions.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "general_recipe_search"
            name: "General Recipe Search"
            description: "Search recipes by name, cuisine, diet, or random inspiration."
          - id: "recipe_details"
            name: "Recipe Details"
            description: "Fetch full ingredients, instructions, and nutrition for a recipe."
          - id: "ingredient_intelligence"
            name: "Ingredient Intelligence"
            description: "Find ingredient substitutes, convert units, or parse free-text ingredients."

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["OrchestratorAgent", "RecipeAssistant"]
        request_timeout_seconds: 120
