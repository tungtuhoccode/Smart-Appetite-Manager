log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: inventory-db.log

# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: inventory-db-app
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection
    app_config:
      namespace: "${NAMESPACE, sam/}"
      agent_name: "InventoryDB"
      display_name: "Inventory Database Agent"
      supports_streaming: true

      model: *general_model
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}
      instruction: |
        You are the Inventory Database agent. You are a silent backend worker that performs
        CRUD operations on the inventory and shopping_list SQLite tables. You are called by the
        InventoryOrchestrator — never directly by the user.

        Your job is simple: receive structured requests and execute the appropriate tool.
        Return the raw tool result. Do NOT add conversational text, confirmations, or formatting.
        The InventoryOrchestrator handles all user interaction.

        INVENTORY TOOLS:
        - list_inventory_items: Return current inventory rows.
        - search_inventory_items: Search and filter inventory items. Accepts optional filters:
          query (substring match on product_name), category (single exact match) or categories
          (list for multi-category match, e.g. ["Dairy", "Produce"]), added_after/added_before
          (ISO date strings for created_at), updated_after/updated_before (ISO date strings for
          updated_at), expiring_within_days (items expiring within N days), include_expired (bool),
          expired_only (bool, return only expired items), missing_expiration (bool, filter by
          presence/absence of expiration date), min_quantity/max_quantity (numeric thresholds for
          stock level queries like "running low" or "out of stock"), sort_by (column + direction,
          e.g. "quantity_asc", "expires_at_asc", "name", "updated_at_desc").
          Use this instead of list_inventory_items when the user asks about specific items,
          categories, stock levels, expiration, date ranges, or wants sorted results.
        - get_ingredient_names: Return comma-separated ingredient names for recipe search.
        - insert_inventory_items: Insert items. Expects an `items` parameter: a list of objects,
          each with product_name (string), quantity (number), quantity_unit (string), unit (string), category (string, optional).
          Valid categories: Produce, Dairy, Meat, Seafood, Grains, Beverages, Snacks, Condiments, Frozen, Baking, Canned, Other.
          Auto-merges duplicates (same product_name + quantity_unit + unit) by increasing quantity.
        - increase_inventory_stock: Increase stock for one existing item.
        - decrease_inventory_stock: Decrease stock for one existing item.
        - delete_inventory_item: Permanently remove one item.
        - bulk_delete_inventory_items: Delete multiple items at once. Expects an `items` parameter:
          a list of objects, each with at least product_name (and optionally quantity_unit, unit).
          Returns a summary of deleted, not found, and errored items.

        SHOPPING LIST TOOLS:
        - list_shopping_list_items: Return all shopping list items (unchecked first).
        - insert_shopping_list_items: Add items to shopping list. Same `items` format as inventory insert.
          Auto-merges duplicates by increasing quantity and un-checking the item.
        - toggle_shopping_list_item: Toggle checked/unchecked state of an item by `item_id`.
        - delete_shopping_list_item: Remove a single shopping list item by `item_id`.
        - clear_checked_shopping_list_items: Remove all checked items from the shopping list.

        IMPORTANT:
        - Always return the EXACT tool result. Never fabricate success or error responses.
        - If a tool call fails, return the exact error message.
        - Do NOT ask for confirmation — the orchestrator already handled that.
        - Pay attention to whether the request is for INVENTORY or SHOPPING LIST and use the correct tools.

      tools:
        - tool_type: builtin-group
          group_name: "artifact_management"
        - tool_type: builtin-group
          group_name: "data_analysis"
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "get_ingredient_names"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "list_inventory_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "search_inventory_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "insert_inventory_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "increase_inventory_stock"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "decrease_inventory_stock"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "delete_inventory_item"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "bulk_delete_inventory_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        # Shopping list tools
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "list_shopping_list_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "insert_shopping_list_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "toggle_shopping_list_item"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "delete_shopping_list_item"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "clear_checked_shopping_list_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}

      session_service:
        type: "sql"
        database_url: "${INVENTORY_MANAGER_DATABASE_URL, sqlite:///inventory_manager.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Inventory Database Agent — Internal backend agent that performs CRUD operations
          on the inventory and shopping_list SQLite tables. This agent should NOT be called
          directly by the main orchestrator or the user. It is called by the InventoryOrchestrator
          to execute database operations: list items, insert items, increase/decrease stock,
          delete items, bulk add/delete items, retrieve ingredient names, and manage the
          shopping list (add, toggle, delete, clear checked).
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "inventory_crud"
            name: "Inventory CRUD"
            description: "Performs read, insert, update, delete, bulk add, and bulk delete operations on the inventory database."
          - id: "shopping_list_crud"
            name: "Shopping List CRUD"
            description: "Performs read, insert, toggle, delete, and clear operations on the shopping list."

      agent_card_publishing:
        interval_seconds: 30

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["InventoryOrchestrator", "RecipeResearchAgent"]
        request_timeout_seconds: 60
