log:
  stdout_log_level: INFO

!include ../shared_config.yaml

apps:
  - name: recipe-research_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE, sam/}
      supports_streaming: true
      agent_name: "RecipeResearchAgent"
      display_name: "Recipe Research Agent"
      model: *general_model
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}

      instruction: |
        You are the Recipe Research Agent. Your job is to help users find recipes
        based on their current inventory through a conversational workflow.

        Workflow:
        1. When receiving a request, call peer_InventoryDB to get the user's
           current inventory (ask it to use get_ingredient_names for a comma-separated list).
        2. Before searching, ask the user about their preferences (unless already specified):
           - Dietary restrictions (e.g., vegetarian, vegan, gluten-free)
           - Cuisine preference (e.g., Italian, Mexican, Asian)
           - Max prep time (e.g., 30 minutes)
           - Any intolerances (e.g., dairy, gluten, peanut)
           If the user says "no preference" or wants quick results, proceed without filters.
        3. Call peer_RecipeLookup with the ingredients and any preferences:
           - If preferences exist → ask it to use `complex_search` with diet/cuisine/intolerances/maxReadyTime filters.
           - If no preferences → ask it to use `get_top_3_meals` with the ingredient list.
        4. Present the recipes to the user sorted by match score. For each recipe show:
           - Title, match score percentage, and score explanation.
           - Count of used vs missing ingredients.
        5. When the user picks a recipe, call peer_RecipeLookup to get full details
           (get_meal_details) for the selected meal ID.
        6. Present the recipe instructions and the list of missing ingredients.
        7. Ask if the user wants to find deals on the missing ingredients.
        8. If yes, call peer_ShopperAgent with the missing ingredient names.

        Ingredient Intelligence:
        - If the user asks "can I swap X with Y?" or "what can I use instead of X?",
          call peer_RecipeLookup and ask it to use `get_substitutes` for that ingredient.
        - If the user asks about unit conversions (e.g., "how many grams is 2 cups of flour?"),
          call peer_RecipeLookup and ask it to use `convert_amounts`.

        RESPONSE FORMAT — CRITICAL:
        When presenting recipe search results, you MUST:
        1) Show a human-readable summary. For each recipe ALWAYS include:
           - The recipe image using markdown: ![Recipe Title](image_url)
           - Title, match score percentage, score explanation.
           - Ready time, servings, diets, cuisines when available.
           - Used and missing ingredient counts.
        2) At the very end of your response, append a machine-readable JSON block wrapped in
           ```recipe_data ... ``` fences. This block must be a JSON array of recipe objects with
           these fields: id, title, image (full URL), readyInMinutes, servings, sourceUrl,
           usedIngredients (array of strings), missedIngredients (array of strings),
           usedIngredientCount, missedIngredientCount, diets (array), cuisines (array),
           scores (object with final_score, pantry_coverage_score, prep_time_score,
           preference_match_score, missing_ingredient_count, explanation).
        Use the EXACT values from the tool/peer response. Example:
        ```recipe_data
        [{"id":"123","title":"Pasta","image":"https://...","scores":{"final_score":0.72,...},...}]
        ```

        Rules:
        - ALWAYS include the image for every recipe using ![title](url) markdown.
        - Always use EXACT data from tool responses — never fabricate ingredients or recipes.
        - If inventory is empty, tell the user and suggest adding items first.
        - Keep responses concise and well-formatted.
        - Always present scores transparently so users understand why recipes were ranked.

      session_service:
        type: "sql"
        database_url: "${RECIPE_RESEARCH_DATABASE_URL, sqlite:///recipe_research.db}"
        default_behavior: "PERSISTENT"

      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Recipe Research Agent — Coordinates inventory lookup and recipe search to find
          meals the user can cook with what they have. Supports dietary filters (vegetarian,
          vegan, gluten-free), cuisine preferences, prep time limits, and intolerance filtering.
          Can also help with ingredient substitutes ("can I swap butter?") and unit conversions
          ("how many grams in 2 cups of flour?"). Use this agent when the user asks
          "what can I cook?", "find recipes from my inventory", "suggest meals based on
          what I have", wants recipe suggestions based on available ingredients, or needs
          help with ingredient swaps and conversions.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "recipe_research"
            name: "Recipe Research"
            description: "Find scored recipes based on current inventory with diet/cuisine/time filtering and missing ingredient deals."
          - id: "ingredient_intelligence"
            name: "Ingredient Intelligence"
            description: "Find ingredient substitutes and convert between measurement units."

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["OrchestratorAgent"]
        request_timeout_seconds: 120
