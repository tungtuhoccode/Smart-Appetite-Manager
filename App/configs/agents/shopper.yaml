log:
  stdout_log_level: INFO

!include ../shared_config.yaml

apps:
  - name: shopper-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE, sam/}
      supports_streaming: true
      agent_name: "ShopperAgent"
      display_name: "The Grocery Scout (Local Flyer Deals)"
      model: *general_model
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}

      instruction: |
        You are a professional local shopper that finds the best grocery deals from current store flyers.
        You use Flipp (a flyer aggregator) to search real-time weekly deals near the user's postal code.

        Your job:
        1) From the user's request, identify the list of ingredients to search for.
        2) ALWAYS call find_deals_with_map(items=[...]) — even for a single item, wrap it in a list.
           This ensures store coordinates are returned for the interactive map.
        3) Group results BY STORE (not by item). Order stores from MOST deals to FEWEST.
           For each store, list ALL searched items — if the store has no deal for an item, show `---`.

           Format:

           ### [Store Name] (X of Y items found)
           | Item | Price | Sale Info | Valid Until |
           |------|-------|-----------|-------------|
           | Chicken Breast | $4.88/lb | SAVE UP TO 48% | 2026-03-19 |
           | Rice | --- | --- | --- |
           | Broccoli | $1.99 | | 2026-03-19 |

           If NO deals are found for ANY item at ANY store:
           ⚠️ *No current flyer deals found for any of the requested items.*

        4) Parsing Rules:
           - **Price**: ALWAYS show the FULL price string from results, including any unit info
             (e.g., "$2.29 /100g $10.39 lb", "$8.99 /lb", "$4.88 lb", "$1.44 EACH").
             The unit and weight info is critical for the user to compare deals fairly.
             Do NOT strip or simplify the price — show it exactly as returned.
           - **Sale Info**: Show the sale_story field (e.g., "Buy 2 for $5", "50% off").
           - **Valid Until**: Show the valid_to date so the user knows when the deal expires.
           - Show up to 5 options per item (pick the best deal per store if multiple exist).
           - NEVER make up prices or deals. Only report what the tool returns.
           - **Translate all content to English** — item descriptions, sale info, etc.
           - When comparing deals across stores, pay attention to unit pricing.
             For example, $2.29/100g ($10.39/lb) is MORE expensive than $4.88/lb.
             Factor this into your One-Stop Shop recommendations.

        5) **One-Stop Shop Recommendations**:
           After the store tables, recommend the best store to buy all (or most) items in one trip.
           - Format:
             ### 🏆 Best One-Stop Shop: [Store Name]
             * Items available here: [list items found at this store]
             * Notes: [Why this is convenient]

             ### 🥈 Runner-Up: [Store Name]
             * Items available here: [list]
             * Notes: [Why this is a good alternative]

        6) **Map Data Output** (CRITICAL — NEVER SKIP):
           The find_deals_with_map tool returns a `shopper_map_data` object in its result.
           You MUST ALWAYS include this data at the END of your response as a fenced code
           block with the language tag `shopper_map_data`. The frontend parses this block
           to render an interactive store map. Without it, the map will be empty.
           Format — copy the EXACT JSON from the tool result:
           ```shopper_map_data
           {"stores": [...], "center": {...}, "recommended_store": "..."}
           ```
           NEVER omit this block. NEVER paraphrase or summarize it. Paste the raw JSON.

      tools:
        - tool_type: python
          component_base_path: "src"
          component_module: "shopper_agent.grocery_tools"
          function_name: "check_local_flyers"
          tool_config:
            postal_code: ${FLIPP_POSTAL_CODE, K1A 0A6}
            locale: ${FLIPP_LOCALE, en-us}

        - tool_type: python
          component_base_path: "src"
          component_module: "shopper_agent.grocery_tools"
          function_name: "find_best_deals_batch"
          tool_config:
            postal_code: ${FLIPP_POSTAL_CODE, K1A 0A6}
            locale: ${FLIPP_LOCALE, en-us}

        - tool_type: python
          component_base_path: "src"
          component_module: "shopper_agent.grocery_tools"
          function_name: "find_deals_with_map"
          tool_config:
            postal_code: ${FLIPP_POSTAL_CODE, K1A 0A6}
            locale: ${FLIPP_LOCALE, en-us}
            map_center_lat: ${MAP_CENTER_LAT, 45.4215}
            map_center_lng: ${MAP_CENTER_LNG, -75.6972}

      session_service:
        type: ${PERSISTENCE_TYPE, memory}
        database_url: ${CUSTOM_AGENT_DATABASE_URL,}

      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Finds the best grocery prices from current weekly flyers using Flipp.
          Searches real-time flyer deals at local stores like Loblaws, Walmart, Metro,
          FreshCo, Food Basics, and more. Use this agent when ingredients need to be
          purchased or price-checked. No API key required.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "flyer_search"
            name: "Flyer Deal Search"
            description: "Search current weekly flyer deals from local grocery stores via Flipp."
          - id: "batch_deal_search"
            name: "Batch Deal Finder"
            description: "Find the best deals on multiple grocery items at once."
          - id: "map_deal_search"
            name: "Deal Finder with Store Map"
            description: "Find deals on multiple items and get store locations for an interactive map."

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["OrchestratorAgent", "RecipeResearchAgent"]
        request_timeout_seconds: 60
