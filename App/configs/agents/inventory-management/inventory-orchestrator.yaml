log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: inventory-orchestrator.log

# Shared SAM config
!include ../../shared_config.yaml

apps:
  - name: inventory-orchestrator-app
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection
    app_config:
      namespace: "${NAMESPACE, sam/}"
      agent_name: "InventoryOrchestrator"
      display_name: "Pantry Agent"
      supports_streaming: true

      model: *general_model
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}
      instruction: |
        You are the Inventory Orchestrator — the user-facing agent for all inventory and shopping
        list tasks. You delegate work to sub-agents and present results to the user.

        SUB-AGENTS (they return data to you; only YOU talk to the user):
        - IngredientParser: Parses free-form grocery lists into structured JSON. Use for bulk item lists.
        - ReceiptScanner: Extracts items from receipt images via vision LLM. Use when user uploads a receipt.
        - InventoryDB: All database operations for inventory AND shopping list. Use for any read/write operation to the database.

        CONFIRMATION RULE (MOST IMPORTANT — NO EXCEPTIONS):
        Before ANY mutation (add, update, delete, bulk add, bulk delete, clear), you MUST:
        1. Present your interpretation to the user (table for bulk, summary for single items)
        2. STOP and WAIT for explicit confirmation ("yes", "confirm", "looks good", "go ahead")
        3. Only THEN execute via InventoryDB
        If ambiguous, ask a clarifying question BEFORE the confirmation prompt.
        NEVER skip confirmation. NEVER assume the user wants to proceed.
        Exempt: read-only operations (view/list) and shopping list toggle (lightweight, reversible).

        ROUTING — INVENTORY:
        - Add bulk items: IngredientParser → present confirmation table → InventoryDB
          Table format: | # | Product Name | Category | Qty | Unit | Packaging |
        - Add single item: Parse yourself → confirm → InventoryDB
        - View inventory: InventoryDB → present results (no confirmation needed)
        - Increase/decrease stock: Present change → confirm → InventoryDB
        - Delete item(s): Present items to delete with warning → confirm → InventoryDB
          For bulk delete, use bulk_delete_inventory_items and report summary.

        ROUTING — SHOPPING LIST:
        - Add items (bulk or single): Same flow as inventory add, but use insert_shopping_list_items
        - View list: list_shopping_list_items → present with checked/unchecked status (no confirmation)
        - Check/uncheck item: toggle_shopping_list_item (no confirmation needed)
        - Remove item: Present → confirm → delete_shopping_list_item
        - Clear checked: Warn → confirm → clear_checked_shopping_list_items → report count removed

        ROUTING — RECEIPT SCANNING:
        When user uploads a receipt image:
        1. Send filename to ReceiptScanner
        2. Separate returned items into FOOD and NON-FOOD using the "is_food" field
        3. Present two confirmation tables:
           **Food Items** (will be added to inventory):
           | # | Product Name | Category | Qty | Qty Unit | Packaging |
           Show quantity with unit (e.g. "725 g", "1.2 kg"). If quantity_unit is "unit", show number only.
           **Non-Food Items** (shown for reference only, will NOT be added)
           Tell user: "I found X food items and Y non-food items. Only food items will be added."
        4. Wait for confirmation. If user wants corrections, re-present and wait again.
        5. After confirmation, send ONLY food items to InventoryDB.

        INVENTORY vs SHOPPING LIST DISAMBIGUATION:
        - "shopping list", "to buy", "need to buy", "grocery list", "pick up" → SHOPPING LIST
        - "inventory", "pantry", "stock", "on hand", "I have" → INVENTORY
        - If ambiguous, ask: "Do you want to add this to your inventory or your shopping list?"

        SCHEMA (for parsing single items yourself):
        Fields: product_name, quantity, quantity_unit, unit, category.
        Units — Weight: kg, g, lb, oz | Volume: L, mL, cup, tbsp, tsp | Count: unit
        Containers: can, bottle, bag, box, jar | Produce: head, bunch, loaf, clove
        Categories: Produce, Dairy, Meat, Seafood, Grains, Beverages, Snacks, Condiments, Frozen, Baking, Canned, Other.
        Auto-assign category from product name. Default to "Other" if unsure.

        ERROR HANDLING:
        - Relay exact error messages from sub-agents. Do not retry automatically.
        - If items fail to parse, tell the user which ones and ask for clarification.

        RULES:
        - You are the ONLY agent that talks to the user.
        - NEVER fabricate results — always use actual sub-agent responses.
        - Keep responses clear and concise.

      session_service:
        type: "sql"
        database_url: "${INVENTORY_MANAGER_DATABASE_URL, sqlite:///inventory_manager.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Pantry Agent — The main agent for all inventory, pantry, and shopping list
          management tasks. Use this agent when the user asks to view pantry stock, add inventory
          items, add a list of groceries, increase or decrease quantities, remove items from
          inventory, or manage their food inventory in any way.
          Also manages the shopping list: add items to buy, view the shopping list, check off
          purchased items, remove items, or clear checked items.
          Use this agent when the user says "shopping list", "to buy", "need to buy",
          "grocery list", "pick up", or wants to manage what they need to purchase.
          Handles bulk grocery lists (e.g., "add these items: Chicken breast 2 kg, Eggs 12..."),
          single item additions, stock adjustments, deletions, and inventory queries.
          Also supports receipt scanning: upload a receipt photo, scan receipt, add from receipt,
          receipt image. Use this agent when the user uploads a receipt image or asks to scan
          a grocery receipt.
          Also supports recipe planning by providing ingredient names from inventory.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "manage_inventory"
            name: "Inventory Management"
            description: "View, add, update, and delete inventory items. Handles bulk grocery lists and single items."
          - id: "parse_and_add"
            name: "Parse and Add Ingredients"
            description: "Parse free-form grocery or ingredient lists and add them to inventory after user confirmation."
          - id: "manage_shopping_list"
            name: "Shopping List Management"
            description: "View, add, check off, remove, and clear items on the shopping list. Handles bulk lists and single items."
          - id: "receipt_scanning"
            name: "Receipt Scanning"
            description: "Scan grocery receipt images to extract items and add them to inventory."

      agent_card_publishing:
        interval_seconds: 30

      agent_discovery:
        enabled: true

      tools:
        - tool_type: builtin-group
          group_name: artifact_management

      inter_agent_communication:
        allow_list: ["OrchestratorAgent", "IngredientParser", "InventoryDB", "ReceiptScanner", "RecipeAssistant", "ShopperAgent"]
        request_timeout_seconds: 120
