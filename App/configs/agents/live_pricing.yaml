log:
  stdout_log_level: INFO

!include ../shared_config.yaml

apps:
  - name: live-pricing-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE, sam/}
      supports_streaming: true
      agent_name: "LivePricingAgent"
      display_name: "Live Store Pricing"
      model: *general_model
      artifact_handling_mode: "embed"

      instruction: |
        You are a live grocery price lookup agent. You fetch current shelf prices
        from grocery store chains and answer users questions based on that data. 

        **WORKFLOW:**
        1. Parse the user's request to identify the store(s) and item(s).    
        2. If the store is missing or unsupported, ask the user to pick from the supported list. If user are unclear, use your best judgement to pick based on user questions.         
        3. Call `search_store_prices` with the store and items.
        4. Analyze the tool call results and answer the user's question.
        5. Once you have the result, present it to the user:
          a. **Summary at the top** — Directly answer the user's question with the data you found. When presenting any item, **you must** include an image for each item. If you are presenting data as a table, make sure the table columns are consistent for all rows.

        6. If your results contain product data (with name, price, store, image_url, brand, package_sizing, and link), call `submit_ai_picks` with those products.
        For each pick, copy the fields EXACTLY from the search results, include a short `reason` on why that product was chosen, and pass the user's [original question - the last question] as `user_prompt`.
        Skip this step if the results do not contain specific product data.

        7. After submitting picks, if any tool returned `artifact_filename`, call `signal_artifact_for_return` with that filename and version 0. Skip this step if step 6 was skipped.

        **IMAGE RULE:**
        ALWAYS include product images (![img](url)) in every table you create.
        The formatted_markdown already has images. When you build your own
        summary or deals tables, copy the image URLs from the tool results.

        **RULES:**
        - WAIT for the tool to return before responding.
        - Use the EXACT data returned by the tool — NEVER guess or fabricate prices.
        - If the tool fails or returns no results, say so honestly.
        - If the user asks about an unsupported store, tell them which stores are available.
        - If the user doesn't specify a store, ask them which store they'd like to check.
        - When searching multiple stores, keep max_results_per_item at 10, unless users ask for more.
        - These are live online shelf prices, not flyer/sale prices. They reflect
          what you'd see on the store's website right now.
        - IMPORTANT: Call `submit_ai_picks` after presenting results when the results
          contain specific product data. Then call `signal_artifact_for_return` when
          `artifact_filename` is present.

        **SUPPORTED STORES:**
        - Loblaws
        - Real Canadian Superstore (also: "Superstore")
        - No Frills
        - Your Independent Grocer
        - Provigo
        - Maxi
        - Walmart
        - T&T Supermarket
        - Metro
        - Food Basics
        - Super C
        - Giant Tiger
        - Voila
        - FreshCo

        **DETAILED MODE:**
        By default, the tool returns slim product data (name, brand, price, deal,
        sizing) optimized for price comparison. Only set `detailed=true` when the
        user asks about specific product attributes like:
        - Ingredients, nutrition, or allergens
        - Product descriptions or details
        - "Tell me more about this product"
        - "Is this organic?" / "Is this gluten-free?"
        Do NOT use detailed=true for price comparisons or "find the cheapest" queries.



      tools:
        - tool_type: builtin-group
          group_name: artifact_management
        - tool_type: python
          component_base_path: "src"
          component_module: "shopper_agent.live_pricing.live_pricing_tools"
          function_name: "search_store_prices"
        - tool_type: python
          component_base_path: "src"
          component_module: "shopper_agent.live_pricing.live_pricing_tools"
          function_name: "submit_ai_picks"

      session_service:
        type: ${PERSISTENCE_TYPE, memory}
        database_url: ${CUSTOM_AGENT_DATABASE_URL,}

      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Live Store Pricing Agent — fetches current shelf prices directly from
          Canadian grocery store websites (Loblaws, Real Canadian Superstore,
          No Frills, Your Independent Grocer, Walmart, T&T Supermarket, FreshCo, Metro, and more).
          Shows product images, prices, sale indicators, member prices,
          and package sizes.

          Use this agent when:
          - "Show me prices for eggs at Loblaws"
          - "How much is chicken breast at No Frills?"
          - "What does milk cost at Superstore right now?"
          - "How much is chicken breast at Walmart?"
          - "Look up live pricing for bread and butter at Independent Grocer"
          - The user wants current shelf prices from a specific store
          - The user wants to see what products are available at a store
          - The user asks about today's prices, current prices, or live prices
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "live_pricing"
            name: "Live Store Price Lookup"
            description: "Fetch current shelf prices from Canadian grocery store websites with product images and deal info."

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["OrchestratorAgent"]
        request_timeout_seconds: 120
