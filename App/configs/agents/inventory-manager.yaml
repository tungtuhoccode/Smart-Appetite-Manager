# Plugin Metadata:
# Name: sam-sql-database
# Version: 0.1.0
# Description: A plugin that provides a SQL agent to perform complex queries based on natural language.
# Author: SolaceLabs <solacelabs@solace.com>

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: inventory-manager.log

# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: inventory-manager-app
    app_module: solace_agent_mesh.agent.sac.app 
    broker:
      <<: *broker_connection
    app_config:
      namespace: "${NAMESPACE, sam/}" # Your A2A topic namespace
      agent_name: "InventoryManager" 
      display_name: "Inventory Manager Agent" 
      supports_streaming: true # SQL agent tools are typically request-response

      model: *general_model 
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}
      instruction: |
        You are Inventory Manager agent. You can read, add, update, and delete inventory items
        using the provided database tools.

        You are smart enough to understand user context and parse user requests even when
        inputs do not match the database schema exactly.
        In those cases, you MUST interpret and normalize the request into the closest valid
        schema-compatible form before any tool call.

        Before performing ANY inventory management mutation (insert, increase, decrease, delete),
        you MUST present your interpreted request to the user and ask for explicit confirmation.
        Only continue after the user confirms.
        If the request is ambiguous, ask a clarifying question first and do not mutate data.

        Tool use:
        - Use list_inventory_items to read current inventory.
        - Use insert_inventory_items to add items from user input.
          The tool auto-detects existing items (same product_name + quantity_unit + unit)
          and increases quantity instead of creating duplicate rows.
        - Use increase_inventory_stock to explicitly increase stock for an existing item.
        - Use decrease_inventory_stock to explicitly decrease stock for an existing item.
        - Use delete_inventory_item to permanently remove an item from inventory.

        IMPORTANT:
        - Always use the tool results and do not assume operations succeeded. 
        - If any inventory tool call fails, you MUST tell the user clearly what failed and include the exact error message from the tool.
        - After reporting an inventory error to the user, stop and do not continue with other steps.

      tools:
        - tool_type: builtin-group
          group_name: "artifact_management"
        - tool_type: builtin-group
          group_name: "data_analysis"
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "list_inventory_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "insert_inventory_items"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "increase_inventory_stock"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "decrease_inventory_stock"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}
        - tool_type: python
          component_base_path: "src"
          component_module: "inventory_agent.inventory_manager_tools"
          function_name: "delete_inventory_item"
          tool_config:
            db_path: ${INVENTORY_MANAGER_DB_NAME}

      session_service: 
        type: "sql"
        database_url: "${INVENTORY_MANAGER_DATABASE_URL, sqlite:///inventory_manager.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service

      # Agent Card, Discovery, and Inter-Agent Communication
      agent_card:
        description: >
          Inventory Manager Agent that reads inventory, inserts new items,
          increases or decreases stock, and deletes items in a configured database.
          Use this agent when the user asks to view pantry stock, add inventory items,
          increase or decrease quantities, or remove items from inventory.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text", "file"] # Can output text or files (artifacts)
        skills:
          - id: "sql_query"
            name: "Inventory Read/Write"
            description: "Reads inventory rows, inserts new items, and increases stock for existing items."

      agent_card_publishing:
        interval_seconds: 30

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["OrchestratorAgent"]
        request_timeout_seconds: 60
