<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Execution Log Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.paused { background: var(--yellow); animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .stats {
    display: flex;
    gap: 16px;
    color: var(--text-dim);
    font-size: 12px;
  }
  .stats span { white-space: nowrap; }
  .stats .val { color: var(--text); font-weight: 600; }
  input, select, button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
  }
  input:focus, select:focus { outline: none; border-color: var(--blue); }
  button {
    cursor: pointer;
    background: var(--border);
    border: none;
    padding: 5px 12px;
    font-weight: 500;
  }
  button:hover { background: #484f58; }
  button.active { background: var(--blue); color: #000; }
  #filter { width: 200px; }
  .log-container { padding: 8px 12px; }
  .log-entry {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .log-entry:hover { border-color: #484f58; }
  .log-entry.new { animation: flash 1s ease-out; }
  @keyframes flash { 0% { border-color: var(--blue); box-shadow: 0 0 8px rgba(88,166,255,0.3); } }
  .entry-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
  }
  .entry-header:hover { background: rgba(255,255,255,0.02); }
  .event-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .event-badge.tool_start { background: rgba(88,166,255,0.15); color: var(--blue); }
  .event-badge.tool_end { background: rgba(63,185,80,0.15); color: var(--green); }
  .event-badge.tool_error { background: rgba(248,81,73,0.15); color: var(--red); }
  .tool-name { color: var(--purple); font-weight: 600; }
  .timestamp { color: var(--text-dim); font-size: 11px; flex-shrink: 0; }
  .duration {
    color: var(--yellow);
    font-size: 11px;
    flex-shrink: 0;
  }
  .duration.slow { color: var(--red); }
  .call-id { color: var(--text-dim); font-size: 10px; opacity: 0.6; }
  .spacer { flex: 1; }
  .expand-icon {
    color: var(--text-dim);
    font-size: 11px;
    transition: transform 0.15s;
  }
  .log-entry.open .expand-icon { transform: rotate(90deg); }
  .entry-body {
    display: none;
    padding: 0 12px 10px;
    border-top: 1px solid var(--border);
  }
  .log-entry.open .entry-body { display: block; }
  .json-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin-top: 8px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
    max-height: 400px;
    overflow-y: auto;
  }
  .json-block label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .file-drop {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--text-dim);
    gap: 12px;
  }
  .file-drop p { font-size: 16px; }
  .file-drop small { font-size: 12px; }
  .pair { display: flex; gap: 4px; border-left: 2px solid var(--blue); margin-bottom: 4px; padding-left: 0; }
  .pair .log-entry { border-left: none; border-radius: 0 8px 8px 0; margin-bottom: 0; flex: 1; }
  .pair .log-entry:first-child { border-radius: 0 8px 0 0; border-bottom: none; }
  .pair .log-entry:last-child { border-radius: 0 0 8px 0; }
  .pair { flex-direction: column; }
  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .error-text { color: var(--red); }
</style>
</head>
<body>
<header>
  <h1>Tool Execution Logs</h1>
  <div class="controls">
    <div class="status-dot" id="statusDot" title="Live polling"></div>
    <input type="text" id="filter" placeholder="Filter by tool name..." />
    <select id="eventFilter">
      <option value="all">All events</option>
      <option value="tool_start">Start only</option>
      <option value="tool_end">End only</option>
      <option value="tool_error">Errors only</option>
      <option value="paired">Paired (start+end)</option>
    </select>
    <button id="autoScrollBtn" class="active" onclick="toggleAutoScroll()">Auto-scroll</button>
    <button onclick="clearView()">Clear view</button>
  </div>
  <div class="toolbar-right">
    <div class="stats">
      <span>Total: <span class="val" id="statTotal">0</span></span>
      <span>Errors: <span class="val error-text" id="statErrors">0</span></span>
      <span>Avg: <span class="val" id="statAvg">-</span></span>
    </div>
    <input type="file" id="fileInput" accept=".jsonl,.log,.txt" style="width:140px" />
  </div>
</header>

<div class="log-container" id="logContainer">
  <div class="file-drop" id="placeholder">
    <p>Waiting for log data...</p>
    <small>Load a file above, or the viewer will auto-poll <code>log.jsonl</code> in the same directory.</small>
  </div>
</div>

<script>
const container = document.getElementById('logContainer');
const placeholder = document.getElementById('placeholder');
const filterInput = document.getElementById('filter');
const eventFilter = document.getElementById('eventFilter');
const statusDot = document.getElementById('statusDot');
const fileInput = document.getElementById('fileInput');

let allEntries = [];
let autoScroll = true;
let pollTimer = null;
let lastSize = 0;
let isFileMode = false;

// --- Rendering ---

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })
    + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function formatDuration(ms) {
  if (ms == null) return '';
  if (ms < 1) return `${(ms * 1000).toFixed(0)}\u00B5s`;
  if (ms < 1000) return `${ms.toFixed(1)}ms`;
  return `${(ms / 1000).toFixed(2)}s`;
}

function syntaxHighlight(json) {
  if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"/g, (match) => {
      if (/:$/.test(match.replace(/\s+$/, ''))) return `<span style="color:#79c0ff">${match}</span>`;
      return `<span style="color:#a5d6ff">${match}</span>`;
    })
    .replace(/\b(true|false)\b/g, '<span style="color:#3fb950">$1</span>')
    .replace(/\b(null)\b/g, '<span style="color:#8b949e">$1</span>')
    .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span style="color:#d29922">$1</span>')
    .replace(/&lt;redacted&gt;/g, '<span style="color:#f85149">&lt;redacted&gt;</span>');
}

function buildEntryEl(entry, isNew) {
  const div = document.createElement('div');
  div.className = `log-entry${isNew ? ' new' : ''}`;
  div.dataset.event = entry.event;
  div.dataset.tool = (entry.tool || '').toLowerCase();
  div.dataset.callId = entry.call_id || '';

  const durationClass = entry.duration_ms > 5000 ? 'duration slow' : 'duration';
  const bodyFields = {};
  if (entry.inputs) bodyFields.Inputs = entry.inputs;
  if (entry.result) bodyFields.Result = entry.result;
  if (entry.error) {
    bodyFields.Error = entry.error;
    if (entry.traceback) bodyFields.Traceback = entry.traceback;
  }

  div.innerHTML = `
    <div class="entry-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="event-badge ${entry.event}">${entry.event.replace('tool_', '')}</span>
      <span class="tool-name">${entry.tool || '?'}</span>
      ${entry.duration_ms != null ? `<span class="${durationClass}">${formatDuration(entry.duration_ms)}</span>` : ''}
      <span class="spacer"></span>
      <span class="call-id">${(entry.call_id || '').slice(0, 8)}</span>
      <span class="timestamp">${formatTime(entry.ts)}</span>
      <span class="expand-icon">&#9654;</span>
    </div>
    <div class="entry-body">
      ${Object.entries(bodyFields).map(([label, data]) =>
        `<div class="json-block"><label>${label}</label>${typeof data === 'string' ? data.replace(/</g,'&lt;') : syntaxHighlight(data)}</div>`
      ).join('')}
    </div>
  `;
  return div;
}

function matchesFilter(entry) {
  const toolFilter = filterInput.value.toLowerCase().trim();
  const evtFilter = eventFilter.value;
  if (toolFilter && !(entry.tool || '').toLowerCase().includes(toolFilter)) return false;
  if (evtFilter !== 'all' && evtFilter !== 'paired' && entry.event !== evtFilter) return false;
  return true;
}

function renderAll() {
  container.innerHTML = '';
  const evtFilter = eventFilter.value;

  if (evtFilter === 'paired') {
    const pairs = new Map();
    allEntries.forEach(e => {
      if (!e.call_id) return;
      if (!pairs.has(e.call_id)) pairs.set(e.call_id, []);
      pairs.get(e.call_id).push(e);
    });
    pairs.forEach((group) => {
      const toolFilter = filterInput.value.toLowerCase().trim();
      if (toolFilter && !group.some(e => (e.tool || '').toLowerCase().includes(toolFilter))) return;
      if (group.length === 1) {
        container.appendChild(buildEntryEl(group[0], false));
      } else {
        const wrapper = document.createElement('div');
        wrapper.className = 'pair';
        group.forEach(e => wrapper.appendChild(buildEntryEl(e, false)));
        container.appendChild(wrapper);
      }
    });
  } else {
    allEntries.forEach(entry => {
      if (matchesFilter(entry)) container.appendChild(buildEntryEl(entry, false));
    });
  }

  updateStats();
  if (autoScroll) scrollToBottom();
  placeholder.style.display = allEntries.length ? 'none' : 'flex';
}

function appendEntry(entry, isNew) {
  if (eventFilter.value === 'paired') { renderAll(); return; }
  if (!matchesFilter(entry)) return;
  placeholder.style.display = 'none';
  container.appendChild(buildEntryEl(entry, isNew));
  updateStats();
  if (autoScroll) scrollToBottom();
}

function updateStats() {
  document.getElementById('statTotal').textContent = allEntries.length;
  const errors = allEntries.filter(e => e.event === 'tool_error').length;
  document.getElementById('statErrors').textContent = errors;
  const durations = allEntries.filter(e => e.duration_ms != null).map(e => e.duration_ms);
  if (durations.length) {
    const avg = durations.reduce((a, b) => a + b, 0) / durations.length;
    document.getElementById('statAvg').textContent = formatDuration(avg);
  } else {
    document.getElementById('statAvg').textContent = '-';
  }
}

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  document.getElementById('autoScrollBtn').classList.toggle('active', autoScroll);
}

function clearView() {
  allEntries = [];
  lastSize = 0;
  container.innerHTML = '';
  placeholder.style.display = 'flex';
  updateStats();
}

// --- Data loading ---

function parseJsonl(text) {
  return text.trim().split('\n').filter(Boolean).map(line => {
    try { return JSON.parse(line); } catch { return null; }
  }).filter(Boolean);
}

function loadEntries(entries, incremental) {
  if (!incremental) {
    allEntries = entries;
    renderAll();
  } else {
    entries.forEach(entry => {
      allEntries.push(entry);
      appendEntry(entry, true);
    });
  }
}

// File input
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  isFileMode = true;
  stopPolling();
  statusDot.classList.add('paused');
  statusDot.title = 'File mode (no polling)';
  const reader = new FileReader();
  reader.onload = () => loadEntries(parseJsonl(reader.result), false);
  reader.readAsText(file);
});

filterInput.addEventListener('input', () => renderAll());
eventFilter.addEventListener('change', () => renderAll());

// --- Polling log.jsonl via fetch ---

async function pollLog() {
  try {
    const resp = await fetch('log.jsonl', { cache: 'no-store' });
    if (!resp.ok) return;
    const text = await resp.text();
    if (text.length === lastSize) return;

    if (lastSize === 0) {
      lastSize = text.length;
      loadEntries(parseJsonl(text), false);
    } else {
      const newText = text.slice(lastSize);
      lastSize = text.length;
      const newEntries = parseJsonl(newText);
      if (newEntries.length) loadEntries(newEntries, true);
    }
  } catch (e) {
    // file not available yet, that's fine
  }
}

function startPolling() {
  if (isFileMode) return;
  pollLog();
  pollTimer = setInterval(pollLog, 2000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

startPolling();
</script>
</body>
</html>
